services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gcs:
    # Local stand-in for Google Cloud Storage. The google-cloud-storage
    # client picks this up automatically when STORAGE_EMULATOR_HOST is set.
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-public-host", "gcs:4443", "-port", "4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcsdata:/storage

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory
      JWT_SECRET: dev-secret-key-change-in-production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5180}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback
      # Dev defaults for the new PoP feature — staging/prod read these from Secret Manager.
      POP_ENCRYPTION_KEY: ${POP_ENCRYPTION_KEY:-ouu1aARMcEOxbR04uMSR_VlhXAhAqPSfzHR8iIeUknA=}
      MOBILE_GOOGLE_CLIENT_ID_IOS: ${MOBILE_GOOGLE_CLIENT_ID_IOS:-}
      MOBILE_GOOGLE_CLIENT_ID_ANDROID: ${MOBILE_GOOGLE_CLIENT_ID_ANDROID:-}
      GCS_BUCKET: moonfive-inventory-photos-dev
      STORAGE_EMULATOR_HOST: http://gcs:4443
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        VITE_INSTALLER_APP_URL: ${VITE_INSTALLER_APP_URL:-moonfive-installer://device}
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5180:8080"
    depends_on:
      - backend

volumes:
  pgdata:
  gcsdata:
